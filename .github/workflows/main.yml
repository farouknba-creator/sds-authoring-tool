name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build standalone exe
        run: |
          pyinstaller --onefile --console --add-data "template.docx;." --add-data "template_fields.json;." --add-data "identities.json;." sds_authoring_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sds-authoring-tool-exe
          path: dist/sds_authoring_tool.exe
